<!DOCTYPE html>
<html>
<head>
    <title>Test WebSocket</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <h1>Test de Conexión WebSocket</h1>
    <div id="status">Conectando...</div>
    <div id="logs"></div>

    <script>
        const deviceKey = '00d6644c-3785-4a2d-ae71-1ec6c81b1a9a';
        const serverUrl = 'http://192.168.18.182:3000';
        
        console.log('Intentando conectar a:', serverUrl);
        console.log('Device Key:', deviceKey);
        
        const socket = io(serverUrl, {
            query: {
                deviceKey: deviceKey
            },
            transports: ['websocket']
        });
        
        socket.on('connect', () => {
            document.getElementById('status').innerHTML = '✅ CONECTADO';
            document.getElementById('status').style.color = 'green';
            addLog('Conectado al servidor');
            addLog('Socket ID: ' + socket.id);
        });
        
        socket.on('disconnect', () => {
            document.getElementById('status').innerHTML = '❌ DESCONECTADO';
            document.getElementById('status').style.color = 'red';
            addLog('Desconectado del servidor');
        });
        
        socket.on('connected', (data) => {
            addLog('Evento "connected" recibido:');
            addLog(JSON.stringify(data, null, 2));
        });
        
        socket.on('error', (error) => {
            addLog('ERROR: ' + JSON.stringify(error));
        });
        
        socket.onAny((eventName, ...args) => {
            addLog(`Evento "${eventName}": ${JSON.stringify(args)}`);
        });
        
        function addLog(message) {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logs.innerHTML += `<div>[${time}] ${message}</div>`;
            console.log(message);
        }
    </script>
</body>
</html>
